<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f0f0f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="MM Handball"/>
  <title>C.D. Marta Mangué</title>
  <link rel="manifest" href="manifest.json"/>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{--b:#0f0f0f;--d:#1a1a1a;--s:#242424;--g:#c9a227;--gl:#e8c84a;--gp:#2a2310;--t:#f0ece0;--m:#888880;--br:rgba(201,162,39,0.2);--bs:rgba(201,162,39,0.5);--red:#e05555;--green:#7dc97d;--blue:#6ab0f5;--blue-bg:rgba(85,153,232,0.1);--blue-border:rgba(85,153,232,0.3)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--b);color:var(--t);min-height:100vh}
    #loading{position:fixed;inset:0;background:var(--b);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:200}
    .spinner{width:40px;height:40px;border:3px solid var(--br);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{color:var(--m);font-size:12px}
    #auth-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .auth-logo{width:90px;height:90px;border-radius:50%;border:2px solid var(--g);overflow:hidden;margin-bottom:16px;background:var(--gp);display:flex;align-items:center;justify-content:center}
    .auth-logo img{width:100%;height:100%;object-fit:cover}
    .auth-club{font-size:18px;font-weight:700;letter-spacing:.04em;text-align:center}
    .auth-lema{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--g);margin:4px 0 28px;text-align:center}
    .auth-card{background:var(--d);border:.5px solid var(--bs);border-radius:16px;padding:24px;width:100%;max-width:360px}
    .auth-title{font-size:13px;font-weight:700;color:var(--g);letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px;text-align:center}
    .field{margin-bottom:16px}
    .field label{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
    .field input{width:100%;background:var(--s);border:.5px solid var(--br);border-radius:8px;padding:11px 13px;color:var(--t);font-size:15px;outline:none}
    .field input:focus{border-color:var(--bs)}
    .btn-gold{width:100%;padding:13px;border-radius:10px;background:var(--g);color:var(--b);font-size:15px;font-weight:700;border:none;cursor:pointer}
    .auth-error{font-size:12px;text-align:center;margin-top:10px;min-height:16px}
    #app{display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}
    .header{background:var(--b);border-bottom:.5px solid var(--br);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .header-logo{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--g);overflow:hidden;flex-shrink:0;background:var(--gp);display:flex;align-items:center;justify-content:center}
    .header-logo img{width:100%;height:100%;object-fit:cover}
    .header-text{flex:1}
    .header-club{font-size:11px;font-weight:700;color:var(--t);letter-spacing:.03em}
    .header-lema{font-size:8px;color:var(--g);letter-spacing:.06em;text-transform:uppercase}
    .cat-chip{background:var(--gp);border:.5px solid var(--bs);border-radius:20px;padding:4px 10px;color:var(--g);font-size:10px;cursor:pointer;display:none}
    .logout-btn{background:transparent;border:.5px solid var(--br);border-radius:8px;color:var(--m);font-size:11px;padding:4px 8px;cursor:pointer}
    .screen{display:none;flex:1;overflow-y:auto;padding:16px;padding-bottom:80px}
    .screen.active{display:block}
    .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--d);border-top:.5px solid var(--br);padding-bottom:env(safe-area-inset-bottom);z-index:10}
    .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 8px;cursor:pointer;border:none;background:transparent}
    .tab-icon{font-size:20px}
    .tab-label{font-size:9px;color:var(--m)}
    .tab.active .tab-label{color:var(--g);font-weight:700}
    .section-title{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--g);text-transform:uppercase;margin-bottom:10px;margin-top:18px}
    .section-title:first-child{margin-top:0}
    .card{background:var(--d);border:.5px solid var(--br);border-radius:12px;padding:13px 15px;margin-bottom:10px}
    .card-title{font-size:14px;font-weight:600;color:var(--t)}
    .card-sub{font-size:12px;color:var(--m);margin-top:3px}
    .card-row{display:flex;justify-content:space-between;align-items:center}
    .badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap}
    .badge-admin{background:var(--gp);color:var(--gl);border:.5px solid var(--bs)}
    .badge-coach{background:var(--blue-bg);color:var(--blue);border:.5px solid var(--blue-border)}
    .badge-colab{background:rgba(125,201,125,.12);color:var(--green);border:.5px solid rgba(125,201,125,.3)}
    .nav-btn{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border:.5px solid var(--br);border-radius:12px;background:var(--d);margin-bottom:8px;cursor:pointer;font-size:14px;color:var(--t);width:100%;text-align:left}
    .nav-btn:active{background:var(--s)}
    .nav-arrow{color:var(--g);font-size:16px}
    .mini-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
    .mini-card{background:var(--d);border:.5px solid var(--br);border-radius:9px;padding:10px 6px;text-align:center}
    .mini-v{font-size:20px;font-weight:700;color:var(--gl)}
    .mini-l{font-size:9px;color:var(--m);margin-top:2px}
    .btn-back{display:flex;align-items:center;gap:6px;background:transparent;border:.5px solid var(--br);border-radius:10px;color:var(--m);font-size:13px;padding:9px 13px;cursor:pointer;margin-bottom:14px;width:100%;text-align:left}
    .btn-back:active{background:var(--s)}
    .plist{background:var(--d);border:.5px solid var(--br);border-radius:12px;overflow:hidden;margin-bottom:10px}
    .prow{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:.5px solid var(--br)}
    .prow:last-child{border-bottom:none}
    .pnum{width:30px;height:30px;border-radius:50%;background:var(--gp);border:.5px solid var(--bs);color:var(--g);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .pnum.inv{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
    .pname{flex:1;font-size:13px;color:var(--t)}
    .psub{font-size:10px;color:var(--m)}
    .form-card{background:var(--d);border:.5px solid var(--bs);border-radius:12px;padding:16px;margin-bottom:12px}
    .form-title{font-size:11px;color:var(--g);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .form-field{margin-bottom:10px}
    .form-field label{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
    .form-field input,.form-field select{width:100%;background:var(--s);border:.5px solid var(--br);border-radius:8px;padding:9px 11px;color:var(--t);font-size:14px;outline:none;font-family:inherit}
    .form-field input:focus,.form-field select:focus{border-color:var(--bs)}
    .form-field select option{background:var(--s)}
    .form-btns{display:flex;gap:8px;margin-top:4px}
    .btn-sm-gold{padding:10px 16px;border-radius:8px;background:var(--g);color:var(--b);font-size:13px;font-weight:700;border:none;cursor:pointer;flex:1}
    .btn-sm-out{padding:10px 16px;border-radius:8px;background:transparent;color:var(--g);border:.5px solid var(--bs);font-size:13px;cursor:pointer}
    .scoreboard{background:var(--d);border:.5px solid var(--br);border-radius:14px;padding:18px 14px;margin-bottom:14px;text-align:center}
    .score-teams{display:flex;align-items:center;justify-content:center;gap:8px}
    .score-team{color:var(--m);font-size:11px;flex:1}
    .score-team.home{text-align:right;color:var(--g)}
    .score-nums{display:flex;align-items:center;gap:4px}
    .score-n{color:var(--t);font-size:38px;font-weight:700;min-width:44px;text-align:center}
    .score-sep{color:var(--m);font-size:28px}
    .score-meta{color:var(--m);font-size:11px;margin-top:8px}
    .score-period{color:var(--g);font-size:12px;font-weight:700;margin-top:2px}
    .ev-panel{background:var(--d);border:.5px solid var(--bs);border-radius:12px;padding:13px;margin-bottom:10px;display:none}
    .ev-player{font-size:12px;color:var(--g);font-weight:700;margin-bottom:10px}
    .ev-btns{display:flex;gap:6px;flex-wrap:wrap}
    .ev-btn{padding:7px 11px;border-radius:8px;font-size:12px;background:var(--s);border:.5px solid var(--br);cursor:pointer;color:var(--t)}
    .ev-btn.gol{border-color:rgba(125,201,125,.4);color:var(--green)}
    .ev-btn.ama{border-color:rgba(232,200,74,.4);color:var(--gl)}
    .ev-btn.roj{border-color:rgba(224,85,85,.4);color:var(--red)}
    .ev-btn.azu{border-color:rgba(106,176,245,.4);color:var(--blue)}
    .ev-btn.exc{border-color:rgba(224,160,85,.4);color:#e0a055}
    .ev-log{font-size:11px;color:var(--green);margin-top:8px;min-height:16px}
    .att-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:.5px solid var(--br)}
    .att-row:last-child{border-bottom:none}
    .att-btns{display:flex;gap:6px;margin-left:auto}
    .att-btn{padding:5px 12px;border-radius:7px;font-size:12px;border:.5px solid var(--br);background:var(--s);color:var(--m);cursor:pointer}
    .att-btn.yes{background:rgba(125,201,125,.15);color:var(--green);border-color:rgba(125,201,125,.4)}
    .att-btn.no{background:rgba(224,85,85,.1);color:var(--red);border-color:rgba(224,85,85,.3)}
    .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .cal-nav button{background:transparent;border:.5px solid var(--br);border-radius:8px;color:var(--g);font-size:16px;padding:4px 12px;cursor:pointer}
    .cal-month{font-size:13px;font-weight:700;color:var(--t);letter-spacing:.05em}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
    .cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;border-radius:8px;color:var(--m);cursor:pointer;position:relative;gap:1px}
    .cal-day.hdr{font-size:9px;color:var(--g);cursor:default}
    .cal-day.today{outline:1.5px solid var(--g);color:var(--gl);font-weight:700}
    .cal-day:not(.hdr):hover{background:var(--s)}
    .cal-dots{display:flex;gap:2px}
    .cal-dot{width:4px;height:4px;border-radius:50%}
    .cal-dot.e{background:var(--blue)}
    .cal-dot.p{background:var(--gl)}
    .cal-dot.cancelled{background:#555}
    .cal-dot.postponed{background:var(--red)}
    .ev-item{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;background:var(--d);border-radius:10px;margin-bottom:8px;border-left:3px solid transparent;cursor:pointer}
    .ev-item.ev-e{border-color:var(--blue)}
    .ev-item.ev-p{border-color:var(--gl)}
    .ev-item.ev-cancelled{border-color:#555;opacity:.7}
    .ev-item.ev-postponed{border-color:var(--red)}
    .ev-body{flex:1}
    .ev-title{font-size:13px;font-weight:600;color:var(--t)}
    .ev-meta{font-size:11px;color:var(--m);margin-top:2px}
    .ev-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;display:inline-block;margin-top:4px}
    .tag-e{background:var(--blue-bg);color:var(--blue)}
    .tag-p{background:var(--gp);color:var(--gl)}
    .tag-cancelled{background:rgba(100,100,100,.2);color:#888}
    .tag-postponed{background:rgba(224,85,85,.1);color:var(--red)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end;justify-content:center}
    .modal-overlay.show{display:flex}
    .modal{background:var(--d);border-radius:20px 20px 0 0;border:1px solid var(--bs);width:100%;max-width:480px;padding:20px;max-height:88vh;overflow-y:auto}
    .modal-title{color:var(--g);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
    .type-btns{display:flex;gap:6px;margin-bottom:12px}
    .type-btn{flex:1;padding:10px 6px;border-radius:8px;font-size:12px;border:.5px solid var(--br);background:var(--s);color:var(--m);cursor:pointer;text-align:center}
    .type-btn.on{border-color:var(--bs);background:var(--gp);color:var(--g)}
    .sub-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .sub-tab{padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer;border:.5px solid var(--br);background:var(--d);color:var(--m)}
    .sub-tab.active{background:var(--gp);color:var(--g);border-color:var(--bs)}
    .sep{height:.5px;background:var(--br);margin:14px 0}
    .del-btn{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(224,85,85,.1);color:var(--red);border:.5px solid rgba(224,85,85,.3);cursor:pointer}
    .inv-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--blue-bg);border-radius:8px;margin:12px 0 6px}
    .inv-tag{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.08em;text-transform:uppercase;border:.5px solid var(--blue-border);padding:2px 8px;border-radius:10px}
    .empty-state{text-align:center;padding:32px 16px;color:var(--m);font-size:13px}
    .match-item{background:var(--d);border:.5px solid var(--br);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
    .match-item:active{background:var(--s)}
    .comp-chip{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--gp);color:var(--gl);border:.5px solid var(--bs);display:inline-block;margin-top:4px}
    .status-active{background:rgba(125,201,125,.15);color:var(--green);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;display:inline-block;margin-top:4px}
    .text-muted{font-size:11px;color:var(--m)}
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div class="loading-text">Cargando...</div></div>

<div id="auth-screen">
  <div class="auth-logo"><img src="logo.jpg" alt="MM" onerror="this.style.display='none'"/></div>
  <div class="auth-club">C.D. MARTA MANGUÉ</div>
  <div class="auth-lema">Donde los sueños se entrenan</div>
  <div class="auth-card">
    <div class="auth-title">Acceso</div>
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email"/></div>
    <div class="field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn-gold" onclick="doLogin()">Entrar</button>
    <div class="auth-error" id="auth-error"></div>
    <div style="text-align:center;margin-top:14px"><span style="font-size:11px;color:var(--m);cursor:pointer" onclick="doReset()">¿Olvidaste tu contraseña?</span></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-logo"><img src="logo.jpg" alt="MM" onerror="this.style.display='none'"/></div>
    <div class="header-text">
      <div class="header-club">C.D. MARTA MANGUÉ</div>
      <div class="header-lema">Donde los sueños se entrenan</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="cat-chip" id="cat-chip" onclick="showCatModal()">Categoría ↓</div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="screen active" id="screen-inicio"><div id="inicio-content"></div></div>
  <div class="screen" id="screen-partido"><div id="partido-content"></div></div>
  <div class="screen" id="screen-entreno"><div id="entreno-content"></div></div>
  <div class="screen" id="screen-calendario"><div id="calendario-content"></div></div>
  <div class="screen" id="screen-panel"><div id="panel-content"></div></div>
  <div class="tabbar" id="tabbar">
    <button class="tab active" data-screen="inicio" onclick="goTo('inicio',this)"><span class="tab-icon">🏠</span><span class="tab-label">Inicio</span></button>
    <button class="tab" data-screen="partido" onclick="goTo('partido',this)"><span class="tab-icon">🤾</span><span class="tab-label">Partido</span></button>
    <button class="tab" data-screen="entreno" onclick="goTo('entreno',this)"><span class="tab-icon">🏋️</span><span class="tab-label">Entreno</span></button>
    <button class="tab" data-screen="calendario" onclick="goTo('calendario',this)"><span class="tab-icon">📅</span><span class="tab-label">Calendario</span></button>
    <button class="tab" data-screen="panel" onclick="goTo('panel',this)"><span class="tab-icon">📊</span><span class="tab-label">Panel</span></button>
  </div>
</div>

<!-- MODAL NUEVO EVENTO -->
<div class="modal-overlay" id="cal-modal" onclick="closeModalClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Nuevo evento — <span id="modal-day-label"></span></div>
    <div style="margin-bottom:12px">
      <div style="font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Tipo</div>
      <div class="type-btns">
        <div class="type-btn on" id="tbtn-e" onclick="selCalType('e')">🏋️ Entreno</div>
        <div class="type-btn" id="tbtn-p" onclick="selCalType('p')">🤾 Partido</div>
      </div>
    </div>
    <div class="form-field"><label>Hora</label><input type="time" id="modal-time" value="18:30"/></div>
    <div class="form-field"><label>Lugar</label><input type="text" id="modal-lugar" placeholder="Pabellón Ingenio"/></div>
    <div class="form-field" id="rival-field" style="display:none"><label>Rival</label><input type="text" id="modal-rival" placeholder="Nombre del equipo rival"/></div>
    <div class="form-field" id="comp-field" style="display:none"><label>Competición</label><select id="modal-comp"><option value="Liga">Liga</option><option value="Copa Apertura">Copa Apertura</option><option value="Copa Deporte&amp;Salud">Copa Deporte&amp;Salud</option><option value="Amistoso">Amistoso</option></select></div>
    <div class="form-field" id="train-type-field"><label>Tipo de sesión</label><select id="modal-train-type"><option>Normal</option><option>Físico</option><option>Técnico-táctico</option><option>Preparación partido</option></select></div>
    <div class="form-btns" style="margin-top:8px">
      <button class="btn-sm-gold" onclick="saveCalEvent()">Guardar</button>
      <button class="btn-sm-out" onclick="hideModal('cal-modal')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE EVENTO -->
<div class="modal-overlay" id="ev-detail-modal" onclick="closeModalClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="ev-detail-title">Evento</div>
    <div id="ev-detail-body"></div>
    <div id="ev-status-actions"></div>
    <button class="btn-sm-out" style="width:100%;margin-top:10px" onclick="hideModal('ev-detail-modal')">Cerrar</button>
  </div>
</div>

<!-- MODAL ESTADO EVENTO -->
<div class="modal-overlay" id="ev-status-modal" onclick="closeModalClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="ev-status-title">Cambiar estado</div>
    <div class="form-field"><label>Motivo</label><input type="text" id="ev-status-motivo" placeholder="Ej: mal tiempo, pista ocupada..."/></div>
    <div class="form-field" id="new-date-field" style="display:none"><label>Nueva fecha (si ya se sabe)</label><input type="date" id="ev-new-date"/></div>
    <div class="form-btns">
      <button class="btn-sm-gold" id="ev-status-save-btn">Confirmar</button>
      <button class="btn-sm-out" onclick="hideModal('ev-status-modal')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL CATEGORÍA -->
<div class="modal-overlay" id="cat-modal" onclick="closeModalClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Selecciona categoría</div>
    <div id="cat-list"></div>
  </div>
</div>

<!-- MODAL ACTA -->
<div class="modal-overlay" id="acta-modal" onclick="closeModalClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Acta del partido</div>
    <div id="acta-content"></div>

const firebaseConfig = { apiKey:"AIzaSyAd8tnUNDa8TDv7EutRL_pn9rY58TrZenU", authDomain:"cd-marta-mangue.firebaseapp.com", projectId:"cd-marta-mangue", storageBucket:"cd-marta-mangue.firebasestorage.app", messagingSenderId:"525494051714", appId:"1:525494051714:web:771998f543c6ef7b33259b" };
const fireApp = initializeApp(firebaseConfig);

const db = getFirestore(fireApp);

let currentUser=null, userProfile=null, currentCat=null;

const CATS=['Benjamín (Mixto)','Alevín Femenino','Alevín Masculino','Infantil Femenino','Infantil Masculino','Cadete Femenino','Cadete Masculino','Juvenil Femenino','Juvenil Masculino'];
const INV_MAP={'Alevín Femenino':'Benjamín (Mixto)','Alevín Masculino':'Benjamín (Mixto)','Infantil Femenino':'Alevín Femenino','Infantil Masculino':'Alevín Masculino','Cadete Femenino':'Infantil Femenino','Cadete Masculino':'Infantil Masculino','Juvenil Femenino':'Cadete Femenino','Juvenil Masculino':'Cadete Masculino'};
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const ROLE_LABELS={admin:'Administrador/a',coach:'Entrenador/a',colab:'Colaborador/a'};

onAuthStateChanged(auth, async user=>{
  hide('loading');
  if(user){currentUser=user; await loadProfile(user.uid);}
  else showFlex('auth-screen');
});

async function loadProfile(uid){
  const snap=await getDoc(doc(db,'users',uid));
  if(snap.exists()){
    userProfile=snap.data();
    currentCat=userProfile.role==='admin'?CATS[0]:userProfile.category;
    setupApp();
  } else { showFlex('auth-screen'); document.getElementById('auth-error').textContent='Usuario no encontrado. Contacta con las administradoras.'; }
}

function setupApp(){
  hide('auth-screen'); showFlex('app');
  if(userProfile.role==='admin'){const c=document.getElementById('cat-chip');c.style.display='block';c.textContent=currentCat+' ↓';}
  if(userProfile.role==='colab'){
    ['entreno','calendario','panel'].forEach(s=>{ const t=document.querySelector('[data-screen='+s+']'); if(t) t.style.display='none'; });
  }
  renderInicio();
}

window.doLogin=async function(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('auth-error');
  err.textContent=''; err.style.color='var(--red)';
  if(!email||!pass){err.textContent='Introduce email y contraseña.';return;}
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){err.textContent='Email o contraseña incorrectos.';}
};
window.doLogout=async function(){await signOut(auth);hide('app');showFlex('auth-screen');document.getElementById('auth-error').textContent='';};
window.doReset=async function(){
  const email=document.getElementById('login-email').value.trim();
  const err=document.getElementById('auth-error');
  if(!email){err.textContent='Introduce tu email primero.';return;}
  await sendPasswordResetEmail(auth,email);
  err.style.color='var(--green)'; err.textContent='Email enviado. Revisa tu bandeja de entrada.';
};

window.goTo=function(screen,tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  if(tab) tab.classList.add('active');
  const r={inicio:renderInicio,partido:renderPartido,entreno:renderEntreno,calendario:renderCalendario,panel:renderPanel};
  if(r[screen]) r[screen]();
};

window.renderInicio=async function renderInicio(){
  const el=document.getElementById('inicio-content');
  const isAdmin=userProfile.role==='admin', isColab=userProfile.role==='colab';
  el.innerHTML=`
    <div class="section-title">Bienvenido/a</div>
    <div class="card">
      <div class="card-row">
        <div><div class="card-title">${userProfile.name}</div><div class="card-sub">${ROLE_LABELS[userProfile.role]}${!isAdmin&&userProfile.category?' · '+userProfile.category:''}</div></div>
        <span class="badge ${ROLE_BADGES[userProfile.role]}">${ROLE_LABELS[userProfile.role]}</span>
      </div>
    </div>
    ${isColab?`
      <div class="section-title">Partidos activos — ${userProfile.category}</div>

    `:`
      <div class="section-title">Acceso rápido</div>
      <button class="nav-btn" onclick="goTo('partido',document.querySelector('[data-screen=partido]'))"><span><span style="font-size:18px;margin-right:10px">🤾</span>Registrar partido</span><span class="nav-arrow">›</span></button>
      <button class="nav-btn" onclick="goTo('entreno',document.querySelector('[data-screen=entreno]'))"><span><span style="font-size:18px;margin-right:10px">🏋️</span>Registrar entreno</span><span class="nav-arrow">›</span></button>
      <button class="nav-btn" onclick="goTo('calendario',document.querySelector('[data-screen=calendario]'))"><span><span style="font-size:18px;margin-right:10px">📅</span>Calendario</span><span class="nav-arrow">›</span></button>
      <button class="nav-btn" onclick="goTo('panel',document.querySelector('[data-screen=panel]'))"><span><span style="font-size:18px;margin-right:10px">📊</span>Panel del club</span><span class="nav-arrow">›</span></button>
      ${isAdmin?`
        <div class="sep"></div>
        <div class="section-title">Administración</div>
        <button class="nav-btn" onclick="renderAdminPlantilla()"><span><span style="font-size:18px;margin-right:10px">👥</span>Gestionar plantillas</span><span class="nav-arrow">›</span></button>
        <button class="nav-btn" onclick="renderAdminUsuarios()"><span><span style="font-size:18px;margin-right:10px">👤</span>Gestionar usuarios</span><span class="nav-arrow">›</span></button>
        <button class="nav-btn" onclick="renderAdminCompeticiones()"><span><span style="font-size:18px;margin-right:10px">🏆</span>Gestionar competiciones</span><span class="nav-arrow">›</span></button>
      `:''}
    `}`;
  if(isColab) loadColabMatches();
}

async function loadColabMatches(){
  const q=query(collection(db,'matches'),where('category','==',userProfile.category),where('status','==','active'));
  const snap=await getDocs(q);
  const el=document.getElementById('colab-matches');
  if(!el) return;
  if(snap.empty){el.innerHTML='<div class="empty-state">No hay partidos activos en tu categoría ahora mismo.</div>';return;}
  el.innerHTML=snap.docs.map(d=>{const m={id:d.id,...d.data()};return `<div class="match-item" onclick="loadActiveMatch('${m.id}');goTo('partido',document.querySelector('[data-screen=partido]'))"><div class="card-title">vs. ${m.rival||'—'}</div><div class="card-sub">${m.competition||''} · ${m.location||''}</div><span class="status-active">En curso</span></div>`;}).join('');
}

async function getPlayers(cat){
  // Buscar TODOS los players y filtrar en cliente para evitar problemas de índice
  const allSnap=await getDocs(collection(db,'players'));
  const all=allSnap.docs.map(d=>({id:d.id,...d.data()}));
  const catNorm=(cat||'').normalize('NFC').trim();
  const filtered=all.filter(p=>{
    const pCat=(p.category||'').normalize('NFC').trim();
    return p.active===true && pCat===catNorm;
  });

  return filtered.sort((a,b)=>a.dorsal-b.dorsal);
}
async function getInvitadas(cat){const inv=INV_MAP[cat];if(!inv)return[];return await getPlayers(inv);}

async function getCompetitions(){
  const snap=await getDocs(collection(db,'competitions'));
  const comps=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(!comps.length) return [{name:'Amistoso'}];
  return [...comps,{name:'Amistoso'}];
}

async function renderPartido(){
  // Asegurarse de que la pantalla esté activa antes de renderizar
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-partido').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const tabPartido=document.querySelector('[data-screen=partido]');
  if(tabPartido) tabPartido.classList.add('active');
  const el=document.getElementById('partido-content');
  if(activeMatchId){await loadActiveMatch(activeMatchId);return;}
  if(userProfile.role==='colab'){el.innerHTML='<div class="empty-state">El/la entrenador/a debe crear el partido primero.</div>';return;}
  const comps=await getCompetitions();
  const allPlayers=await getPlayers(currentCat);
  const allInvs=await getInvitadas(currentCat);
  el.innerHTML=`
    <div class="section-title">Nuevo partido — ${currentCat}</div>
    <div class="form-card">
      <div class="form-title">Datos del partido</div>
      <div class="form-field"><label>Rival</label><input type="text" id="match-rival" placeholder="Nombre del equipo rival"/></div>
      <div class="form-row">
        <div class="form-field"><label>Fecha</label><input type="date" id="match-date" value="${new Date().toISOString().split('T')[0]}"/></div>
        <div class="form-field"><label>Hora</label><input type="time" id="match-time" value="11:00"/></div>
      </div>
      <div class="form-field"><label>Lugar</label><input type="text" id="match-location" placeholder="Pabellón Ingenio"/></div>
      <div class="form-field"><label>Competición</label><select id="match-comp">${comps.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}</select></div>
      <div class="form-field"><label>¿Jugamos de...?</label><select id="match-venue"><option value="local">Local (en casa)</option><option value="visitante">Visitante (fuera)</option></select></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="section-title" style="margin:0">Convocatoria — toca para incluir/excluir</div>
      <span style="font-size:10px;color:var(--m)" id="conv-count">0 convocadas</span>
    </div>
    <div class="plist" id="conv-list"></div>
    ${allInvs.length>0?`<div class="inv-header"><span class="inv-tag">INVITAD@S</span><span style="font-size:11px;color:var(--m)">De ${INV_MAP[currentCat]||''}</span></div><div class="plist" id="conv-inv-list"></div>`:''}
    <button class="btn-sm-gold" style="width:100%;margin-top:12px;padding:13px" onclick="startMatch()">Iniciar partido con convocadas</button>
    <div class="sep"></div>
    <div class="section-title">Historial de partidos</div>
    <div id="match-history"><div class="empty-state">Cargando...</div></div>`;

  // Renderizar convocatoria
  const convList=document.getElementById('conv-list');
  const convPlayers=allPlayers;
  const convInvList=document.getElementById('conv-inv-list');
  let convocadas=new Set(allPlayers.map(p=>p.id)); // todas convocadas por defecto

  function renderConvList(){
    if(!convList) return;
    convList.innerHTML=convPlayers.map(p=>{
      const sel=convocadas.has(p.id);
      return '<div class="prow conv-row" data-id="'+p.id+'" style="cursor:pointer;background:'+(sel?'rgba(201,162,39,0.1)':'')+'">'+
        '<div class="pnum" style="background:'+(sel?'var(--gp)':'var(--s)')+';border-color:'+(sel?'var(--bs)':'var(--br)')+';color:'+(sel?'var(--g)':'var(--m)')+'">'+p.dorsal+'</div>'+
        '<div class="pname">'+p.name+(p.surname?' '+p.surname:'')+'</div>'+
        '<span style="font-size:11px;color:'+(sel?'var(--green)':'var(--red)')+';">'+(sel?'✓ Convocada':'✗ No convocada')+'</span>'+
      '</div>';
    }).join('');
    convList.querySelectorAll('.conv-row').forEach(row=>{
      row.onclick=function(){
        const id=row.dataset.id;
        if(convocadas.has(id)) convocadas.delete(id); else convocadas.add(id);
        renderConvList();
        renderConvInvList();
        updateConvCount();
      };
    });
  }

  function renderConvInvList(){
    if(!convInvList) return;
    convInvList.innerHTML=allInvs.map(p=>{
      const sel=convocadas.has(p.id);
      return '<div class="prow conv-inv-row" data-id="'+p.id+'" style="cursor:pointer;background:'+(sel?'rgba(85,153,232,0.1)':'')+'">'+
        '<div class="pnum inv" style="opacity:'+(sel?1:0.4)+'">'+p.dorsal+'</div>'+
        '<div class="pname">'+p.name+(p.surname?' '+p.surname:'')+'<br><span class="psub">INVITAD@</span></div>'+
        '<span style="font-size:11px;color:'+(sel?'var(--green)':'var(--red)')+';">'+(sel?'✓ Convocada':'✗ No convocada')+'</span>'+
      '</div>';
    }).join('');
    convInvList.querySelectorAll('.conv-inv-row').forEach(row=>{
      row.onclick=function(){
        const id=row.dataset.id;
        if(convocadas.has(id)) convocadas.delete(id); else convocadas.add(id);
        renderConvList();
        renderConvInvList();
        updateConvCount();
      };
    });
  }

  function updateConvCount(){
    const el2=document.getElementById('conv-count');
    if(el2) el2.textContent=convocadas.size+' convocadas';
  }

  // Guardar referencia de convocadas para startMatch
  window._convocadas=convocadas;
  window._renderConvList=renderConvList;
  window._renderConvInvList=renderConvInvList;
  window._updateConvCount=updateConvCount;

  renderConvList();
  renderConvInvList();
  updateConvCount();
  loadMatchHistory();
}

async function loadMatchHistory(){
  const el=document.getElementById('match-history');if(!el)return;
  const q=query(collection(db,'matches'),where('category','==',currentCat));
  const snap=await getDocs(q);
  if(snap.empty){el.innerHTML='<div class="empty-state">Aún no hay partidos registrados.</div>';return;}
  const matches=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(b.date)-new Date(a.date));
  el.innerHTML=matches.map(m=>`
    <div class="match-item">
      <div onclick="showMatchActa('${m.id}')" style="cursor:pointer">
        <div class="card-row"><div class="card-title">${(!m.venue||m.venue==='local')?'vs. '+m.rival:m.rival+' vs. MM'}</div><div style="font-size:14px;font-weight:700;color:var(--gl)">${(!m.venue||m.venue==='local')?(m.scoreHome??0)+' – '+(m.scoreAway??0):(m.scoreAway??0)+' – '+(m.scoreHome??0)}</div></div>
        <div class="card-sub">${new Date(m.date).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})} · ${m.location||''}</div>
        ${m.competition?`<span class="comp-chip">${m.competition}</span>`:''}
        ${m.status==='active'?'<span class="status-active" style="margin-left:6px">En curso</span>':''}
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn-sm-out" style="flex:1;font-size:11px;padding:6px" onclick="showMatchActa('${m.id}')">Ver acta</button>
        <button class="del-btn" style="font-size:11px;padding:6px 10px" onclick="deleteMatch('${m.id}')">Eliminar</button>
      </div>
    </div>`).join('');
}

window.startMatch=async function(){
  const rival=document.getElementById('match-rival').value.trim();
  if(!rival){alert('Introduce el nombre del rival.');return;}
  const convIds=window._convocadas?Array.from(window._convocadas):[];
  if(convIds.length===0){alert('Selecciona al menos una jugadora convocada.');return;}
  const venue=document.getElementById('match-venue').value;
  const ref=await addDoc(collection(db,'matches'),{
    category:currentCat, rival, date:document.getElementById('match-date').value,
    time:document.getElementById('match-time').value, location:document.getElementById('match-location').value.trim(),
    competition:document.getElementById('match-comp').value, venue, scoreHome:0, scoreAway:0,
    status:'active', events:[], convocadas:convIds, createdBy:currentUser.uid, createdAt:serverTimestamp()
  });
  activeMatchId=ref.id; matchScoreHome=0; matchScoreAway=0; matchEvents=[];
  await loadActiveMatch(ref.id);
};

window.loadActiveMatch=async function(id){
  const el=document.getElementById('partido-content');
  const snap=await getDoc(doc(db,'matches',id));
  if(!snap.exists()){el.innerHTML='<div class="empty-state">Partido no encontrado.</div>';return;}
  const m={id:snap.id,...snap.data()};
  activeMatchId=id; matchScoreHome=m.scoreHome||0; matchScoreAway=m.scoreAway||0; matchEvents=m.events||[];
  const isLocal=!m.venue||m.venue==='local';
  const teamLeft=isLocal?'C.D. Marta Mangué':m.rival;
  const teamRight=isLocal?m.rival:'C.D. Marta Mangué';
  const scoreLeft=isLocal?matchScoreHome:matchScoreAway;
  const scoreRight=isLocal?matchScoreAway:matchScoreHome;
  const allP=await getPlayers(m.category), allI=await getInvitadas(m.category);
  const convIds=m.convocadas&&m.convocadas.length>0?new Set(m.convocadas):null;
  const players=convIds?allP.filter(p=>convIds.has(p.id)):allP;
  const invs=convIds?allI.filter(p=>convIds.has(p.id)):allI;

  el.innerHTML=`
    <div class="scoreboard">
      <div class="score-teams">
        <div class="score-team home">${teamLeft}</div>
        <div class="score-nums">
          <div class="score-n" id="score-left">${scoreLeft}</div>
          <div class="score-sep">:</div>
          <div class="score-n" id="score-right">${scoreRight}</div>
        </div>
        <div class="score-team">${teamRight}</div>
      </div>
      <div class="score-meta">${isLocal?'🏠 Local':'✈️ Visitante'} · ${m.competition||''} · ${m.location||''}</div>
      <div class="score-period">${new Date(m.date).toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'})}</div>
      <div style="margin-top:12px;display:flex;align-items:center;justify-content:center;gap:12px">
        <div style="font-size:28px;font-weight:700;color:var(--t);font-variant-numeric:tabular-nums;min-width:80px;text-align:center" id="crono-display">00:00</div>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:8px">
        <button onclick="cronoStart()" id="btn-start" style="padding:6px 16px;border-radius:8px;background:var(--g);color:var(--b);border:none;font-size:12px;font-weight:700;cursor:pointer">▶ Iniciar</button>
        <button onclick="cronoPause()" id="btn-pause" style="padding:6px 16px;border-radius:8px;background:var(--s);color:var(--m);border:.5px solid var(--br);font-size:12px;cursor:pointer;display:none">⏸ Pausar</button>
        <button onclick="cronoReset()" style="padding:6px 16px;border-radius:8px;background:var(--s);color:var(--m);border:.5px solid var(--br);font-size:12px;cursor:pointer">↺ Reiniciar</button>
      </div>
    </div>
        <div style="display:flex;gap:6px;margin-bottom:10px">
      <button class="ev-btn" onclick="addRivalGoal()" style="flex:1;font-size:12px;padding:7px 8px;border-color:rgba(224,85,85,.4);color:var(--red)">+ Gol rival</button>
      <button class="ev-btn" onclick="undoRivalGoal()" style="flex:1;font-size:12px;padding:7px 8px;border-color:rgba(224,85,85,.3);color:var(--red);opacity:.7">- Gol rival</button>
      <button class="ev-btn" onclick="undoLastEvent()" style="flex:1;font-size:12px;padding:7px 8px;border-color:rgba(201,162,39,.4);color:var(--gl)">↩ Deshacer</button>
    </div>
    <div class="ev-panel" id="ev-panel">
      <div class="ev-player" id="ev-player-name">Selecciona una jugadora/jugador</div>
      <div class="ev-btns">
        <button class="ev-btn gol" onclick="regEvent('gol','⚽ Gol')">⚽ Gol</button>
        <button class="ev-btn ama" onclick="regEvent('amarilla','🟨 Amarilla')">🟨 Amarilla</button>
        <button class="ev-btn roj" onclick="regEvent('roja','🟥 Roja')">🟥 Roja</button>
        <button class="ev-btn azu" onclick="regEvent('azul','🟦 Azul')">🟦 Azul</button>
        <button class="ev-btn exc" onclick="regEvent('exclusion','⏱ 2min')">⏱ 2min</button>
      </div>
      <div class="ev-log" id="ev-log"></div>
    </div>

    <div class="plist" id="match-plist"></div>
    ${invs.length>0?`<div class="inv-header"><span class="inv-tag">INVITAD@S</span><span style="font-size:11px;color:var(--m)">De ${INV_MAP[m.category]}</span></div><div class="plist">${invs.map(p=>`<div class="prow" onclick="selMatchPlayer(this,'${p.id}','${p.name} ${p.surname||''}',${p.dorsal})"><div class="pnum inv">${p.dorsal}</div><div class="pname">${p.name} ${p.surname||''}<br><span class="psub">INVITAD@</span></div></div>`).join('')}</div>`:''}
    <div class="section-title">Eventos registrados (<span id="ev-count">${matchEvents.length}</span>)</div>
    <div class="plist" id="match-events-list" style="min-height:40px">
      ${matchEvents.length>0?matchEvents.map(e=>`<div class="prow"><div style="flex:1;font-size:12px;color:var(--t)">${e.label}</div><div style="font-size:11px;color:var(--m)">${e.playerName}</div></div>`).join(''):'<div class="empty-state" style="padding:10px">Sin eventos aún</div>'}
    </div>
    <button class="btn-gold" style="width:100%;margin-top:8px" onclick="finishMatch()">Finalizar y guardar partido</button>`;
  // Renderizar jugadoras directamente en el innerHTML
  const plist=document.getElementById('match-plist');
  if(plist){
    if(players.length===0){
      plist.innerHTML='<div class="empty-state">Sin jugadores/as en esta categoría.</div>';
    } else {
      plist.innerHTML=players.map(p=>{
        const fullName=p.name+(p.surname?' '+p.surname:'');
        const div=document.createElement('div');
        div.className='prow';
        div.innerHTML='<div class="pnum">'+p.dorsal+'</div><div class="pname">'+fullName+'</div>';
        div.onclick=function(){selMatchPlayer(div,p.id,fullName,p.dorsal);};
        return div.outerHTML;
      }).join('');
      // Re-asignar onclick porque outerHTML pierde los handlers
      plist.querySelectorAll('.prow').forEach((row,i)=>{
        const p=players[i];
        const fullName=p.name+(p.surname?' '+p.surname:'');
        row.onclick=function(){selMatchPlayer(row,p.id,fullName,p.dorsal);};
      });
    }
  }
  // Renderizar INVITAD@S
  if(invs.length>0){
    const invSection=document.createElement('div');
    invSection.innerHTML='<div class="inv-header"><span class="inv-tag">INVITAD@S</span><span style="font-size:11px;color:var(--m)">De '+INV_MAP[m.category]+'</span></div>';
    const invList=document.createElement('div');
    invList.className='plist';
    invList.innerHTML=invs.map(p=>{
      const fullName=p.name+(p.surname?' '+p.surname:'');
      return '<div class="prow" data-id="'+p.id+'" data-name="'+fullName+'" data-dorsal="'+p.dorsal+'"><div class="pnum inv">'+p.dorsal+'</div><div class="pname">'+fullName+'<br><span class="psub">INVITAD@</span></div></div>';
    }).join('');
    invList.querySelectorAll('.prow').forEach(row=>{
      const id=row.dataset.id, name=row.dataset.name, dorsal=parseInt(row.dataset.dorsal);
      row.onclick=function(){selMatchPlayer(row,id,name,dorsal);};
    });
    plist.after(invSection);
    invSection.after(invList);
  }
};

let cronoInterval=null, cronoSeconds=0, cronoRunning=false;

function cronoTick(){
  cronoSeconds++;
  const m=Math.floor(cronoSeconds/60).toString().padStart(2,'0');
  const s=(cronoSeconds%60).toString().padStart(2,'0');
  const el=document.getElementById('crono-display');
  if(el) el.textContent=m+':'+s;
}

window.cronoStart=function(){
  if(cronoRunning) return;
  cronoRunning=true;
  cronoInterval=setInterval(cronoTick,1000);
  const btnStart=document.getElementById('btn-start');
  const btnPause=document.getElementById('btn-pause');
  if(btnStart) btnStart.style.display='none';
  if(btnPause) btnPause.style.display='block';
};

window.cronoPause=function(){
  if(!cronoRunning) return;
  cronoRunning=false;
  clearInterval(cronoInterval);
  const btnStart=document.getElementById('btn-start');
  const btnPause=document.getElementById('btn-pause');
  if(btnStart){btnStart.style.display='block';btnStart.textContent='▶ Continuar';}
  if(btnPause) btnPause.style.display='none';
};

window.cronoReset=function(){
  cronoRunning=false;
  clearInterval(cronoInterval);
  cronoSeconds=0;
  const el=document.getElementById('crono-display');
  if(el) el.textContent='00:00';
  const btnStart=document.getElementById('btn-start');
  const btnPause=document.getElementById('btn-pause');
  if(btnStart){btnStart.style.display='block';btnStart.textContent='▶ Iniciar';}
  if(btnPause) btnPause.style.display='none';
};

window.selMatchPlayer=function(row,id,name,dorsal){

  matchSelPlayer={id,name,dorsal};
  document.getElementById('ev-player-name').textContent=name+' — elige evento:';
  document.getElementById('ev-panel').style.display='block';
  document.getElementById('ev-log').textContent='';
};

window.regEvent=async function(type,label){
  if(!matchSelPlayer)return;
  if(type==='gol'){
    matchScoreHome++;
    const snap2=await getDoc(doc(db,'matches',activeMatchId));
    const isLocal2=!snap2.data().venue||snap2.data().venue==='local';
    document.getElementById(isLocal2?'score-left':'score-right').textContent=matchScoreHome;
  }
  const ev={type,label,playerId:matchSelPlayer.id,playerName:matchSelPlayer.name,ts:new Date().toISOString()};
  matchEvents.push(ev);
  await updateDoc(doc(db,'matches',activeMatchId),{scoreHome:matchScoreHome,events:matchEvents});
  const logEl=document.getElementById('ev-log');
  if(logEl){logEl.style.color='var(--green)';logEl.textContent='OK: '+label+' registrado para '+matchSelPlayer.name;}
  const evList=document.getElementById('match-events-list');
  if(evList) evList.innerHTML=matchEvents.map(e=>'<div class="prow"><div style="flex:1;font-size:12px;color:var(--t)">'+e.label+'</div><div style="font-size:11px;color:var(--m)">'+e.playerName+'</div></div>').join('');
  const evCount=document.getElementById('ev-count');
  if(evCount) evCount.textContent=matchEvents.length;
};

window.undoLastEvent=async function(){
  if(!matchEvents.length){
    const log=document.getElementById('ev-log');
    if(log){log.style.color='var(--red)';log.textContent='No hay eventos para deshacer.';}
    return;
  }
  const last=matchEvents[matchEvents.length-1];
  matchEvents.pop();
  if(last.type==='gol'){
    matchScoreHome=Math.max(0,matchScoreHome-1);
    const snap2=await getDoc(doc(db,'matches',activeMatchId));
    const isLocal2=!snap2.data().venue||snap2.data().venue==='local';
    const scoreEl=document.getElementById(isLocal2?'score-left':'score-right');
    if(scoreEl) scoreEl.textContent=matchScoreHome;
  }
  await updateDoc(doc(db,'matches',activeMatchId),{scoreHome:matchScoreHome,events:matchEvents});
  const log=document.getElementById('ev-log');
  if(log){log.style.color='var(--gl)';log.textContent='Deshecho: '+last.label+' de '+last.playerName;}
  const evSection=document.getElementById('match-events-list');
  if(evSection) evSection.innerHTML=matchEvents.length>0?matchEvents.map(e=>'<div class="prow"><div style="flex:1;font-size:12px;color:var(--t)">'+e.label+'</div><div style="font-size:11px;color:var(--m)">'+e.playerName+'</div></div>').join(''):'<div class="empty-state" style="padding:10px">Sin eventos</div>';
};

  matchScoreAway=Math.max(0,matchScoreAway-1);
  const snap2=await getDoc(doc(db,'matches',activeMatchId));
  const isLocal2=!snap2.data().venue||snap2.data().venue==='local';

async function loadCalEvents(){
  calEvents={};
  const q=query(collection(db,'events'),where('category','==',currentCat));
  const snap=await getDocs(q);
  snap.docs.forEach(d=>{const ev={id:d.id,...d.data()};if(!calEvents[ev.dateKey])calEvents[ev.dateKey]=[];calEvents[ev.dateKey].push(ev);});
}

function buildCalendar(){
  const el=document.getElementById('calendario-content');
  const first=new Date(calYear,calMonth,1).getDay(), offset=(first+6)%7;
  const last=new Date(calYear,calMonth+1,0).getDate(), today=new Date();
  let days='';
  ['L','M','X','J','V','S','D'].forEach(d=>{days+=`<div class="cal-day hdr">${d}</div>`;});
  for(let i=0;i<offset;i++) days+='<div class="cal-day"></div>';
  for(let d=1;d<=last;d++){
    const key=`${calYear}-${calMonth+1}-${d}`;
    const isToday=today.getDate()===d&&today.getMonth()===calMonth&&today.getFullYear()===calYear;
    const evs=calEvents[key]||[];
    const dotTypes=[...new Set(evs.map(e=>e.status==='cancelled'?'cancelled':e.status==='postponed'?'postponed':e.type))];
    const dots=dotTypes.map(t=>`<div class="cal-dot ${t}"></div>`).join('');
    days+=`<div class="cal-day${isToday?' today':''}" onclick="openCalDay(${d},'${key}')">${d}${dots?`<div class="cal-dots">${dots}</div>`:''}</div>`;
  }
  el.innerHTML=`
    <div class="cal-nav"><button onclick="changeMonth(-1)">‹</button><span class="cal-month">${MONTHS[calMonth]} ${calYear}</span><button onclick="changeMonth(1)">›</button></div>
    <div class="cal-grid">${days}</div>
    <div style="display:flex;gap:10px;margin-bottom:12px;font-size:10px;color:var(--m)">
      <span><span style="color:var(--blue)">●</span> Entreno</span><span><span style="color:var(--gl)">●</span> Partido</span><span><span style="color:#555">●</span> Cancelado</span><span><span style="color:var(--red)">●</span> Aplazado</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="section-title" style="margin:0">Eventos de ${MONTHS[calMonth]}</div>
      <button class="btn-sm-gold" style="padding:6px 14px;font-size:12px" onclick="openCalDay(null,null)">+ Añadir</button>
    </div>
    <div id="ev-list">${buildEvList()}</div>`;
}

function buildEvList(){
  const keys=Object.keys(calEvents).filter(k=>{const p=k.split('-');return parseInt(p[0])===calYear&&parseInt(p[1])===(calMonth+1);}).sort((a,b)=>parseInt(a.split('-')[2])-parseInt(b.split('-')[2]));
  if(!keys.length) return '<div class="empty-state">Sin eventos este mes. Toca + Añadir.</div>';
  const icons={e:'🏋️',p:'🤾'};
  let html='';
  keys.forEach(key=>{
    const day=key.split('-')[2];
    const dn=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][new Date(calYear,calMonth,parseInt(day)).getDay()];
    calEvents[key].forEach(ev=>{
      const st=ev.status||'active';
      const itemCls=st==='cancelled'?'ev-cancelled':st==='postponed'?'ev-postponed':'ev-'+ev.type;
      const tagCls=st==='cancelled'?'tag-cancelled':st==='postponed'?'tag-postponed':ev.type==='e'?'tag-e':'tag-p';
      const tagLbl=st==='cancelled'?'Cancelado':st==='postponed'?'Aplazado':ev.type==='e'?'Entrenamiento':'Partido';
      html+=`<div class="ev-item ${itemCls}" onclick="openEvDetail('${ev.id}')">
        <span style="font-size:20px">${icons[ev.type]||'📅'}</span>
        <div class="ev-body">
          <div class="ev-title">${dn} ${day} — ${ev.title}</div>
          <div class="ev-meta">${ev.meta||''}${ev.reason?' · Motivo: '+ev.reason:''}</div>
          <span class="ev-tag ${tagCls}">${tagLbl}</span>
          ${ev.competition?`<span class="comp-chip" style="margin-left:4px">${ev.competition}</span>`:''}
        </div>
      </div>`;
    });
  });
  return html;
}

async function loadPanelPartidos(){
  const el=document.getElementById('pan-partidos');
  const q=query(collection(db,'matches'),where('category','==',currentCat),where('status','==','finished'));
  const snap=await getDocs(q);
  if(snap.empty){el.innerHTML='<div class="empty-state">Aún no hay partidos finalizados.</div>';return;}
  const matches=snap.docs.map(d=>({id:d.id,...d.data()}));
  const byComp={};
  matches.forEach(m=>{const c=m.competition||'Sin competición';if(!byComp[c])byComp[c]=[];byComp[c].push(m);});
  let html=`<div class="mini-grid"><div class="mini-card"><div class="mini-v">${matches.length}</div><div class="mini-l">Partidos</div></div><div class="mini-card"><div class="mini-v">${matches.reduce((s,m)=>s+(m.scoreHome||0),0)}</div><div class="mini-l">Goles</div></div><div class="mini-card"><div class="mini-v">${Object.keys(byComp).length}</div><div class="mini-l">Competiciones</div></div></div>`;
  Object.entries(byComp).forEach(([comp,ms])=>{
    html+=`<div class="section-title">${comp}</div>`;
    html+=ms.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(m=>`<div class="match-item" onclick="showMatchActa('${m.id}')"><div class="card-row"><div class="card-title">vs. ${m.rival}</div><div style="font-size:14px;font-weight:700;color:var(--gl)">${m.scoreHome??0} – ${m.scoreAway??0}</div></div><div class="card-sub">${new Date(m.date).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})}</div></div>`).join('');
  });
  el.innerHTML=html;
}

window.loadPanelJugadoras=async function(){
  const el=document.getElementById('pan-jugadoras');
  el.innerHTML='<div class="empty-state">Calculando estadísticas...</div>';
  // Obtener todos los partidos finalizados de la categoría
  const q=query(collection(db,'matches'),where('category','==',currentCat),where('status','==','finished'));
  const snap=await getDocs(q);
  const matches=snap.docs.map(d=>({id:d.id,...d.data()}));
  // Obtener todas las jugadoras
  const players=await getPlayers(currentCat);
  if(!players.length){el.innerHTML='<div class="empty-state">No hay jugadoras en esta categoría.</div>';return;}
  // Calcular estadísticas por jugadora
  const stats={};
  players.forEach(p=>{
    stats[p.id]={player:p,partidos:0,goles:0,amarillas:0,rojas:0,azules:0,exclusiones:0};
  });
  matches.forEach(m=>{
    const conv=m.convocadas?new Set(m.convocadas):null;
    players.forEach(p=>{
      if(!conv||conv.has(p.id)) stats[p.id].partidos++;
    });
    (m.events||[]).forEach(ev=>{
      if(stats[ev.playerId]){
        if(ev.type==='gol') stats[ev.playerId].goles++;
        else if(ev.type==='amarilla') stats[ev.playerId].amarillas++;
        else if(ev.type==='roja') stats[ev.playerId].rojas++;
        else if(ev.type==='azul') stats[ev.playerId].azules++;
        else if(ev.type==='exclusion') stats[ev.playerId].exclusiones++;
      }
    });
  });
  const statsList=Object.values(stats).sort((a,b)=>b.goles-a.goles||a.player.dorsal-b.player.dorsal);
  const maxGoles=Math.max(1,...statsList.map(s=>s.goles));
  if(!matches.length){
    el.innerHTML='<div class="empty-state">Aún no hay partidos finalizados.</div>';
    return;
  }
  el.innerHTML=`
    <div class="mini-grid" style="grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div class="mini-card"><div class="mini-v">${players.length}</div><div class="mini-l">Jugadoras</div></div>
      <div class="mini-card"><div class="mini-v">${matches.length}</div><div class="mini-l">Partidos</div></div>
    </div>
    <div class="section-title">Estadísticas individuales</div>
    <div class="plist" id="stats-list"></div>
  `;
  const statsList2=document.getElementById('stats-list');
  statsList2.innerHTML=statsList.map(s=>`
    <div class="prow" style="flex-direction:column;align-items:flex-start;gap:6px;cursor:pointer" onclick="showPlayerStats('${s.player.id}')">
      <div style="display:flex;align-items:center;gap:10px;width:100%">
        <div class="pnum">${s.player.dorsal}</div>
        <div class="pname" style="flex:1">${s.player.name} ${s.player.surname||''}</div>
        <span style="font-size:11px;color:var(--m)">${s.partidos} partidos</span>
      </div>
      <div style="display:flex;gap:8px;padding-left:40px;flex-wrap:wrap">
        ${s.goles>0?`<span style="font-size:11px;background:rgba(125,201,125,.15);color:var(--green);padding:2px 8px;border-radius:10px">⚽ ${s.goles}</span>`:''}
        ${s.amarillas>0?`<span style="font-size:11px;background:rgba(232,200,74,.15);color:var(--gl);padding:2px 8px;border-radius:10px">🟨 ${s.amarillas}</span>`:''}
        ${s.rojas>0?`<span style="font-size:11px;background:rgba(224,85,85,.12);color:var(--red);padding:2px 8px;border-radius:10px">🟥 ${s.rojas}</span>`:''}
        ${s.azules>0?`<span style="font-size:11px;background:rgba(106,176,245,.12);color:var(--blue);padding:2px 8px;border-radius:10px">🟦 ${s.azules}</span>`:''}
        ${s.exclusiones>0?`<span style="font-size:11px;background:rgba(224,160,85,.12);color:#e0a055;padding:2px 8px;border-radius:10px">⏱ ${s.exclusiones}</span>`:''}
        ${s.goles===0&&s.amarillas===0&&s.rojas===0&&s.azules===0&&s.exclusiones===0?`<span style="font-size:11px;color:var(--m)">Sin eventos</span>`:''}
      </div>
      ${s.goles>0?`<div style="padding-left:40px;width:100%"><div style="height:6px;background:var(--s);border-radius:3px;overflow:hidden"><div style="height:100%;background:var(--g);border-radius:3px;width:${Math.round(s.goles/maxGoles*100)}%"></div></div></div>`:''}
    </div>
  `).join('');
};

window.showPlayerStats=async function(playerId){
  const q=query(collection(db,'matches'),where('category','==',currentCat),where('status','==','finished'));
  const snap=await getDocs(q);
  const matches=snap.docs.map(d=>({id:d.id,...d.data()}));
  const players=await getPlayers(currentCat);
  const player=players.find(p=>p.id===playerId);
  if(!player) return;
  let partidos=0,goles=0,amarillas=0,rojas=0,azules=0,exclusiones=0;
  const historial=[];
  matches.forEach(m=>{
    const conv=m.convocadas?new Set(m.convocadas):null;
    const convocado=!conv||conv.has(playerId);
    if(convocado) partidos++;
    const evs=(m.events||[]).filter(e=>e.playerId===playerId);
    evs.forEach(ev=>{
      if(ev.type==='gol') goles++;
      else if(ev.type==='amarilla') amarillas++;
      else if(ev.type==='roja') rojas++;
      else if(ev.type==='azul') azules++;
      else if(ev.type==='exclusion') exclusiones++;
    });
    if(convocado&&evs.length>0){
      const isL=!m.venue||m.venue==='local';
      historial.push({date:m.date,rival:m.rival,isLocal:isL,scoreHome:m.scoreHome??0,scoreAway:m.scoreAway??0,events:evs});
    }
  });
  const modal=document.getElementById('acta-modal');
  document.getElementById('acta-content').innerHTML=`
    <div class="card" style="border-color:var(--bs);text-align:center;margin-bottom:14px">
      <div class="pnum" style="width:44px;height:44px;font-size:16px;margin:0 auto 8px">${player.dorsal}</div>
      <div style="font-size:16px;font-weight:700;color:var(--t)">${player.name} ${player.surname||''}</div>
      <div style="font-size:11px;color:var(--m);margin-top:2px">${currentCat}</div>
    </div>
    <div class="mini-grid">
      <div class="mini-card"><div class="mini-v">${partidos}</div><div class="mini-l">Partidos</div></div>
      <div class="mini-card"><div class="mini-v" style="color:var(--green)">${goles}</div><div class="mini-l">Goles</div></div>
      <div class="mini-card"><div class="mini-v" style="color:var(--gl)">${amarillas}</div><div class="mini-l">Amarillas</div></div>
    </div>
    <div class="mini-grid">
      <div class="mini-card"><div class="mini-v" style="color:var(--red)">${rojas}</div><div class="mini-l">Rojas</div></div>
      <div class="mini-card"><div class="mini-v" style="color:var(--blue)">${azules}</div><div class="mini-l">Azules</div></div>
      <div class="mini-card"><div class="mini-v" style="color:#e0a055">${exclusiones}</div><div class="mini-l">Exclusiones</div></div>
    </div>
    ${historial.length>0?`
      <div class="section-title">Partidos con eventos</div>
      <div class="plist">${historial.map(h=>{
        const d=new Date(h.date).toLocaleDateString('es-ES',{day:'numeric',month:'short'});
        const gMM=h.isLocal?h.scoreHome:h.scoreAway;
        const gR=h.isLocal?h.scoreAway:h.scoreHome;
        return '<div class="prow"><div style="flex:1"><div class="ct" style="font-size:13px">'+(h.isLocal?'vs. '+h.rival:h.rival+' vs. MM')+'</div><div class="cs">'+d+' · '+gMM+'-'+gR+'</div></div><div style="display:flex;gap:4px;flex-wrap:wrap">'+h.events.map(e=>'<span style="font-size:11px">'+e.label+'</span>').join('')+'</div></div>';
      }).join('')}</div>
    `:''}
  `;
  showModal('acta-modal');
};

let importData=[];
window.openImportForm=function(){document.getElementById("import-form").style.display="block";document.getElementById("add-player-form").style.display="none";document.getElementById("import-preview").innerHTML="";document.getElementById("import-msg").textContent="";importData=[];};

window.previewImport=function(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  if(file.name.toLowerCase().endsWith(".csv")){
    reader.onload=function(e){
      var text=e.target.result;
      var lines=text.split("\n").filter(function(l){return l.trim();});
      importData=lines.map(function(l){
        var row=l.replace("\n","").split(/[;,\t]/);
        return{name:(row[0]||"").trim(),surname:(row[1]||"").trim(),dorsal:parseInt(row[2])||0};
      }).filter(function(p){return p.name&&p.dorsal;});
      showImportPreview();
    }; reader.readAsText(file,"UTF-8");
  } else {
    reader.onload=function(e){
      var data=new Uint8Array(e.target.result);
      try{
        var wb=XLSX.read(data,{type:"array"});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        importData=rows.filter(function(r){return r[0];}).map(function(r){
          return{name:String(r[0]||"").trim(),surname:String(r[1]||"").trim(),dorsal:parseInt(r[2])||0};
        }).filter(function(p){return p.name&&p.dorsal;});
        showImportPreview();
      }catch(ex){
        document.getElementById("import-msg").style.color="var(--red)";
        document.getElementById("import-msg").textContent="Error leyendo el Excel. Prueba a guardarlo como CSV.";
      }
    }; reader.readAsArrayBuffer(file);
  }
};

function showImportPreview(){
  var el=document.getElementById("import-preview");
  if(!importData.length){el.innerHTML="<div style='color:var(--red);font-size:12px'>No se encontraron datos. Revisa el formato.</div>";return;}
  var rows=importData.slice(0,20).map(function(p){return '<div class="prow"><div class="pnum">'+p.dorsal+'</div><div class="pname">'+p.name+' '+p.surname+'</div></div>';}).join("");
  var more=importData.length>20?'<div style="text-align:center;padding:8px;font-size:11px;color:var(--m)">+'+(importData.length-20)+' mas...</div>':"";
  el.innerHTML='<div style="font-size:11px;color:var(--green);margin-bottom:6px">OK: '+importData.length+' jugadores/as detectados/as:</div><div class="plist" style="max-height:200px;overflow-y:auto">'+rows+more+'</div>';
}

window.importPlayers=async function(){

  msg.style.color="var(--m)"; msg.textContent="Importando...";
  let count=0;
  for(const p of importData){

};

window.deleteComp=async function(id){if(!confirm('¿Eliminar esta competición?'))return;await deleteDoc(doc(db,'competitions',id));await renderAdminCompeticiones();};

window.exportCSV=async function(){
  const q=query(collection(db,'matches'),where('category','==',currentCat),where('status','==','finished'));
  const snap=await getDocs(q);
  if(snap.empty){alert('No hay partidos finalizados para exportar.');return;}
  const matches=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(a.date)-new Date(b.date));
  let csv='Fecha;Rival;Local/Visitante;Competicion;Goles MM;Goles Rival;Resultado\n';
  matches.forEach(m=>{
    const isLocal=!m.venue||m.venue==='local';
    const gMM=isLocal?m.scoreHome??0:m.scoreAway??0;
    const gRival=isLocal?m.scoreAway??0:m.scoreHome??0;
    const res=gMM>gRival?'Victoria':gMM<gRival?'Derrota':'Empate';
    csv+=m.date+';'+m.rival+';'+(isLocal?'Local':'Visitante')+';'+(m.competition||'')+';'+gMM+';'+gRival+';'+res+'\n';
  });
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='partidos_'+currentCat.replace(/ /g,'_')+'.csv';
  a.click(); URL.revokeObjectURL(url);
};

window.exportPDF=async function(){
  const q=query(collection(db,'matches'),where('category','==',currentCat),where('status','==','finished'));
  const snap=await getDocs(q);
  if(snap.empty){alert('No hay partidos finalizados para exportar.');return;}
  const matches=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const totalGoles=matches.reduce((s,m)=>{const isL=!m.venue||m.venue==='local';return s+(isL?m.scoreHome??0:m.scoreAway??0);},0);
  const victorias=matches.filter(m=>{const isL=!m.venue||m.venue==='local';const gMM=isL?m.scoreHome??0:m.scoreAway??0;const gR=isL?m.scoreAway??0:m.scoreHome??0;return gMM>gR;}).length;
  const derrotas=matches.filter(m=>{const isL=!m.venue||m.venue==='local';const gMM=isL?m.scoreHome??0:m.scoreAway??0;const gR=isL?m.scoreAway??0:m.scoreHome??0;return gMM<gR;}).length;
  const empates=matches.length-victorias-derrotas;
  const rowsHtml=matches.map(m=>{
    const isL=!m.venue||m.venue==='local';
    const gMM=isL?m.scoreHome??0:m.scoreAway??0;
    const gR=isL?m.scoreAway??0:m.scoreHome??0;
    const res=gMM>gR?'Victoria':gMM<gR?'Derrota':'Empate';
    const color=gMM>gR?'#2e7d32':gMM<gR?'#c62828':'#555';
    const d=new Date(m.date).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
    return '<tr><td>'+d+'</td><td>'+(isL?'vs. '+m.rival:m.rival+' vs. MM')+'</td><td>'+(isL?'Local':'Visitante')+'</td><td>'+(m.competition||'—')+'</td><td style="text-align:center;font-weight:bold">'+gMM+' – '+gR+'</td><td style="text-align:center;color:'+color+';font-weight:bold">'+res+'</td></tr>';
  }).join('');
  const html='<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Informe '+currentCat+'</title><style>*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}body{padding:30px;color:#1a1a1a}.header{background:#0f0f0f;color:#fff;padding:20px 24px;border-radius:8px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}.club{font-size:18px;font-weight:700;letter-spacing:.04em}.lema{font-size:10px;color:#c9a227;letter-spacing:.1em;text-transform:uppercase;margin-top:4px}.cat{font-size:13px;color:#c9a227;text-align:right}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}.stat{background:#f5f5f5;border-radius:8px;padding:14px;text-align:center}.stat-n{font-size:28px;font-weight:700;color:#c9a227}.stat-l{font-size:11px;color:#666;margin-top:3px}table{width:100%;border-collapse:collapse;font-size:13px}th{background:#1a1a1a;color:#c9a227;padding:10px 12px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.05em;text-transform:uppercase}td{padding:9px 12px;border-bottom:1px solid #eee}tr:nth-child(even){background:#fafafa}.footer{margin-top:24px;text-align:center;font-size:10px;color:#888;padding-top:14px;border-top:1px solid #eee}@media print{body{padding:15px}}</style></head><body><div class="header"><div><div class="club">C.D. MARTA MANGUÉ</div><div class="lema">Donde los sueños se entrenan</div></div><div class="cat"><div style="font-size:15px;font-weight:700">'+currentCat+'</div><div style="font-size:11px;margin-top:4px">Informe de partidos</div></div></div><div class="stats"><div class="stat"><div class="stat-n">'+matches.length+'</div><div class="stat-l">Partidos</div></div><div class="stat"><div class="stat-n" style="color:#2e7d32">'+victorias+'</div><div class="stat-l">Victorias</div></div><div class="stat"><div class="stat-n" style="color:#555">'+empates+'</div><div class="stat-l">Empates</div></div><div class="stat"><div class="stat-n" style="color:#c62828">'+derrotas+'</div><div class="stat-l">Derrotas</div></div></div><table><thead><tr><th>Fecha</th><th>Partido</th><th>Condición</th><th>Competición</th><th>Resultado</th><th>Balance</th></tr></thead><tbody>'+rowsHtml+'</tbody></table><div class="footer">C.D. Marta Mangué · Documento generado automáticamente</div></body></html>';
  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(()=>w.print(),500);
};

window.showCatModal=function(){
  document.getElementById('cat-list').innerHTML=CATS.map(c=>`<button class="nav-btn" onclick="setCat('${c}')" style="margin-bottom:7px"><span>${c}</span>${c===currentCat?'<span style="color:var(--g)">✓</span>':'<span class="nav-arrow">›</span>'}</button>`).join('');
  showModal('cat-modal');
};
window.setCat=async function(cat){currentCat=cat;document.getElementById('cat-chip').textContent=cat+' ↓';hideModal('cat-modal');const active=document.querySelector('.tab.active')?.dataset?.screen||'inicio';goTo(active,null);};

function showModal(id){document.getElementById(id).classList.add('show');}
function hideModal(id){document.getElementById(id).classList.remove('show');}
window.hideModal=hideModal;
window.closeModalClick=function(e){if(e.target.classList.contains('modal-overlay'))e.target.classList.remove('show');};

function showFlex(id){document.getElementById(id).style.display='flex';}
